# Optional: updates the gh-pages branch with the built app.
# Use this only if Settings → Pages → Source is "Deploy from a branch" → gh-pages → / (root).
# If Source is "GitHub Actions", you do not need this workflow.

name: Publish to gh-pages branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
