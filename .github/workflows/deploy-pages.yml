# Builds the app and publishes to the gh-pages branch.
# In repo Settings → Pages, set Source to "Deploy from a branch":
#   branch gh-pages, folder / (root)
# OR set Source to "GitHub Actions" (see optional second job below).
#
# Do NOT use branch "main" as the Pages source — that serves unbuilt source
# and the site will break or show an old version after each push.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-uploaded: ${{ steps.upload.outputs.artifact-id != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: cp dist/index.html dist/404.html
      - name: Publish built app to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
      - id: upload
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy-github-actions:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
